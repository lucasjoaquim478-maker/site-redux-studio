<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamer Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="card">

  <!-- AVATAR + STATUS -->
  <div class="avatar-box">
    <img id="avatar" class="avatar">
    <div id="status-indicator"></div>
  </div>

  <h1 id="username">@loading</h1>
  <p class="bio">⚡ Gamer • Dev</p>

  <!-- SPOTIFY -->
  <div id="spotify-box"></div>

  <!-- DISCORD -->
  <div id="discord-status"></div>

  <div class="stats">
    <span id="session-time">00:00</span>
    <span id="dc-time">--:--</span>
  </div>

  <button id="copy">Copy Discord</button>

</div>

<div id="cursor"></div>

<audio id="click-sound">
  <source src="click.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>

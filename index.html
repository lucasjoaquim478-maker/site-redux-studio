<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Gamer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="enter-screen">
  <h1 class="glitch">🔥 Clique para entrar 🔥</h1>
</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<canvas id="particles"></canvas>
<div id="cursor"></div>

<div class="container" id="main-content">

  <img id="avatar" class="avatar">
  <h1 class="glow" id="username">@carregando...</h1>
  <p id="desc"></p>

  <!-- DISCORD -->
  <div id="discord-status"></div>

  <p id="session-time">⏱ Tempo jogado: 00:00</p>
  <p id="dc-time">🕒 --:--</p>

  <div class="links">
    <a id="discord-btn">🎮 Discord (clique para copiar)</a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
